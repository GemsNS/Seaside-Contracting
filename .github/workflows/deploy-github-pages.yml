# Deploy static export to GitHub Pages (project site: username.github.io/repo-name/).
# Enable: Settings → Pages → Build and deployment → Source: GitHub Actions.
#
# Contact form: static export has no /api. Set repository secret NEXT_PUBLIC_CONTACT_API_URL to a
# full URL that accepts the same JSON POST as app/api/contact (e.g. deploy this app on Vercel
# for the API only, or use another backend).

name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      # API routes are incompatible with next export
      - run: rm -rf app/api

      - name: Build static site
        run: npm run build
        env:
          STATIC_EXPORT: "true"
          BASE_PATH: ${{ github.event.repository.name == format('{0}.github.io', github.repository_owner) && '' || format('/{0}', github.event.repository.name) }}
          NEXT_PUBLIC_BASE_PATH: ${{ github.event.repository.name == format('{0}.github.io', github.repository_owner) && '' || format('/{0}', github.event.repository.name) }}
          NEXT_PUBLIC_CONTACT_API_URL: ${{ secrets.NEXT_PUBLIC_CONTACT_API_URL }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
